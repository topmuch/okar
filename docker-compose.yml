# ═══════════════════════════════════════════════════════════════════════════════
# OKAR - Docker Compose for Coolify
# Production-ready configuration
# ═══════════════════════════════════════════════════════════════════════════════

services:
  okar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: okar-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      - DATABASE_URL=file:/app/data/okar.db
      
      # NextAuth
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      
      # App URLs
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # Encryption
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-okar-encryption-key-change-me}
      
      # Optional: PayPal
      - PAYPAL_MODE=${PAYPAL_MODE:-sandbox}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      
      # Node Environment
      - NODE_ENV=production
      
    volumes:
      # Persist SQLite database
      - okar-data:/app/data
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - "coolify.managed=true"
      - "coolify.name=OKAR"

volumes:
  okar-data:
    driver: local
